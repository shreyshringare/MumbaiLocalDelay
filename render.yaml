# Render deployment configuration
# seed_db.py uses committed data/raw/real_baselines.parquet — no network calls at build time
services:
  - type: web
    name: mumbai-local-delay
    env: python
    buildCommand: pip install ".[dev]" && cd frontend && npm ci && npm run build && cd .. && python scripts/seed_db.py
    # Vite builds the React frontend to api/static/ which FastAPI serves at "/"
    startCommand: gunicorn api.main:app --bind 0.0.0.0:$PORT --workers 1 --worker-class uvicorn.workers.UvicornWorker --timeout 120
    envVars:
      - key: DUCKDB_PATH
        value: delays.duckdb
      - key: DATA_RAW_DIR
        value: data/raw
