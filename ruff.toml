line-length = 88
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — ruff format handles this
]

[lint.isort]
known-first-party = ["pipeline", "analysis", "dashboard"]

[format]
quote-style = "double"
indent-style = "space"
